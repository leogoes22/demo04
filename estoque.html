```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Estoque TK Veículos</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #estoque {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .info {
      padding: 15px;
    }

    .info h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .info p {
      margin: 4px 0;
      font-size: 14px;
    }

    .preco {
      color: #00ff88;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      margin-top: 50px;
      font-size: 18px;
    }

    .erro {
      text-align: center;
      color: red;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <h1>🚗 Estoque TK Veículos</h1>

  <div id="status" class="loading">Carregando veículos...</div>
  <div id="estoque"></div>

  <script>
    const URL = "https://webhook.lv-mktdeconversa.com/webhook/estoque-tk";

    async function carregarEstoque() {
      try {
        const res = await fetch(URL);

        if (!res.ok) {
          throw new Error("Erro ao buscar dados");
        }

        const data = await res.json();

        if (!data.veiculos || data.veiculos.length === 0) {
          document.getElementById("status").innerHTML = "Nenhum veículo encontrado.";
          return;
        }

        document.getElementById("status").style.display = "none";

        const container = document.getElementById("estoque");

        data.veiculos.forEach(v => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${v.foto}" alt="${v.Modelo}">
            <div class="info">
              <h3>${v.Marca} ${v.Modelo}</h3>
              <p>${v.Versao || ''}</p>
              <p>📅 ${v.AnoFab}/${v.AnoMod}</p>
              <p>⛽ ${v.Combustivel}</p>
              <p>⚙️ ${v.Cambio}</p>
              <p>📍 ${v.KM ? v.KM + ' km' : '0 km'}</p>
              <div class="preco">
                R$ ${v.Preco ? Number(v.Preco).toLocaleString('pt-BR') : 'Consultar'}
              </div>
            </div>
          `;

          container.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("status").className = "erro";
        document.getElementById("status").innerHTML = "Erro ao carregar estoque 😢";
      }
    }

    carregarEstoque();
  </script>

</body>
</html>
```
